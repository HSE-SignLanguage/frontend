services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-8081}:${FRONTEND_PORT:-8081}"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - PORT=${FRONTEND_PORT:-8081}
    command: sh -c "serve -s dist -l tcp://0.0.0.0:$${PORT:-8081}"
    restart: unless-stopped
