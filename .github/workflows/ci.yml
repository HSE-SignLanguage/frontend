name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.23.1"

jobs:
  quality:
    name: Lint and formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static analysis
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --reporter=verbose

  build:
    name: Build production assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload production assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Audit locked dependencies
        run: npm audit --audit-level=high

  container-security:
    name: Container build, scan and SBOM
    needs:
      - quality
      - test
      - build
      - dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REF: hse-signlanguage-frontend:ci-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build container image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          push: false
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan Dockerfile configuration
        run: >-
          trivy config --severity HIGH,CRITICAL --exit-code 1
          --skip-version-check Dockerfile

      - name: Scan image for high and critical findings
        run: >-
          trivy image --scanners vuln,secret --severity HIGH,CRITICAL
          --exit-code 1 --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Generate CycloneDX SBOM
        id: sbom
        if: ${{ always() && steps.image.outcome == 'success' }}
        run: >-
          trivy image --format cyclonedx --output sbom.cdx.json
          --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Upload SBOM
        if: ${{ always() && steps.sbom.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14
